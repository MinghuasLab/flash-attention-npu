name: Bug Report
description: Raise an issue here if you find a bug.
title: "[BUG]: "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: >
        #### Before submitting an issue, please make sure the issue hasn't been already open or addressed by searching through [existing issues](https://github.com/MinghuasLab/flash-attention-npu/issues).
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      description: Please confirm the following before submitting.
      options:
        - label: I have searched the existing issues and confirmed this is not a duplicate.
          required: true
        - label: I can reproduce this on the latest release.
          required: true
        - label: I have redacted any sensitive information from logs.
          required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Provide detailed environment information.
      value: |
        - Device (e.g., Ascend 910B):
        - CANN version:
        - PyTorch version:
        - torch_npu version:
        - Python version:
        - flash_attn_npu version:
        - etc.
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Describe the bug clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide minimal step-by-step instructions to reproduce the bug.
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error output
      description: Paste the error log. Redact any sensitive content.
      render: shell
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context that is relevant.
    validations:
      required: false