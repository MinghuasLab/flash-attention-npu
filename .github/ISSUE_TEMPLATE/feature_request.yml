name: Feature Request
description: Suggest an idea for this project
title: "[FEAT]: "
labels: ["feature request"]
assignees: []
body:
  - type: textarea
    id: feature-description
    attributes:
      label: Feature Request
      description: Describe your feature request.
      placeholder: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why do we need this feature?
      placeholder: Explain the use case or problem you are trying to solve.
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
      placeholder: e.g., links to related issues, design mockups, or code examples.
    validations:
      required: false